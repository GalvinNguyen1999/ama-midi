services:
  postgres:
    image: postgres:16-alpine
    container_name: ama-midi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ama
      POSTGRES_PASSWORD: ama
      POSTGRES_DB: ama_midi
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ama -d ama_midi']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ama-midi-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://ama:ama@postgres:5432/ama_midi
      ACCESS_TOKEN_SECRET: dev-access-secret-change-me
      REFRESH_TOKEN_SECRET: dev-refresh-secret-change-me
      LOG_LEVEL: info
      CORS_ORIGINS: http://localhost:8080
      FRONTEND_BASE_URL: http://localhost:8080
    ports:
      - '3000:3000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api
        VITE_WS_URL: ws://localhost:3000
    container_name: ama-midi-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  pgdata:
