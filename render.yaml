databases:
  - name: ama-midi-db
    databaseName: ama_midi
    user: ama
    plan: free

services:
  - type: web
    name: ama-midi-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ama-midi-db
          property: connectionString
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: https://ama-midi-web.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://ama-midi-web.onrender.com

  - type: web
    name: ama-midi-web
    runtime: static
    rootDir: apps/web
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ama-midi-api.onrender.com/api
      - key: VITE_WS_URL
        value: wss://ama-midi-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
