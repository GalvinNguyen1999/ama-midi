name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ama
          POSTGRES_PASSWORD: ama
          POSTGRES_DB: ama_midi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ama -d ama_midi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ama:ama@localhost:5432/ama_midi_test
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_BASE_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: apps/api/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: apps/web/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn test:ci
      - run: yarn build
